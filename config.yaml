collection:
  sources:
    g2b_api: true
    kapt_api: true       # KAPT_SERVICE_KEY 필요, 없으면 자동 skip
    alio: true
    g2b_crawler: false   # deprecated (엔드포인트 사망)
    d2b_api: true        # 국방전자조달 (G2B 서비스키 공용)
    kwater_api: true     # 한국수자원공사 (공사/물품/용역/내자 4 오퍼레이션)
  request_sleep_seconds: 1.5
  page_size: 100
  lookback_days: 1
  alio:
    keyword: ""
    max_pages: 10
  kapt:
    base_url: ""       # 빈 값이면 collectors/kapt_api.py의 DEFAULT_BASE_URL 사용
    operation: ""
  kwater:
    # 한국수자원공사 K-water 전자조달 입찰공고 (data.go.kr 15101635)
    # operations 4개 자동 순회: cntrwkList/gdsList/servcList/dmscptList
    # 주의: 경로는 "ebid" (소문자). 대문자는 500 에러.
    base_url: "https://apis.data.go.kr/B500001/ebid/tndr3"
    type_param: "_type"

filters:
  include_keywords: ["전기", "소방", "통신", "건축", "신축", "납품", "공사", "태양광", "환경", "실내건축"]
  exclude_keywords: ["청소", "경비"]
  min_amount_eok: 0
  max_amount_eok: 9999
  # 빈 리스트([])로 두면 모든 업종 통과. 특정 업종만 원하면 원하는 값만 나열.
  bid_types: ["물품", "용역", "공사", "K-apt", "공공기관"]
  case_sensitive: false

notifier:
  channels: ["email"]
  email:
    smtp_host: "smtp.gmail.com"
    smtp_port: 587
    from_addr: "bot@example.com"
    to_addrs: ["me@example.com"]
    use_tls: true
  slack:
    webhook_url_env: "SLACK_WEBHOOK_URL"

schedule:
  collect_cron: "0 8 * * *"
  notify_cron: "30 8 * * *"
  timezone: "Asia/Seoul"

logging:
  level: "INFO"
  file: "logs/bid_collector.log"
  max_bytes: 10485760
  backup_count: 5

database:
  path: "data/bids.sqlite"
