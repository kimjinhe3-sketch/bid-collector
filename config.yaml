collection:
  sources:
    g2b_api: true
    kapt_api: true       # KAPT_SERVICE_KEY 필요, 없으면 자동 skip
    alio: true
    g2b_crawler: false   # deprecated (엔드포인트 사망)
    d2b_api: true        # 국방전자조달 (G2B 서비스키 공용)
    kwater_api: false    # 엔드포인트 미확인 — Swagger에서 URL 확인 후 활성화
  request_sleep_seconds: 1.5
  page_size: 100
  lookback_days: 1
  alio:
    keyword: ""
    max_pages: 10
  kapt:
    base_url: ""       # 빈 값이면 collectors/kapt_api.py의 DEFAULT_BASE_URL 사용
    operation: ""
  kwater:
    # K-water는 data.go.kr Swagger UI에서 아래 값 확인 필요
    # (data.go.kr > 마이페이지 > 활용신청 > 15101635 상세 > 미리보기)
    base_url: ""       # 예: "http://apis.data.go.kr/B551335/KWaterBidInfoService"
    operation: ""      # 예: "getBidPblancList"
    type_param: "_type"

filters:
  include_keywords: ["AI", "데이터", "클라우드"]
  exclude_keywords: ["청소", "경비"]
  min_amount_eok: 0
  max_amount_eok: 9999
  # 빈 리스트([])로 두면 모든 업종 통과. 특정 업종만 원하면 원하는 값만 나열.
  bid_types: ["물품", "용역", "공사", "K-apt", "공공기관"]
  case_sensitive: false

notifier:
  channels: ["email"]
  email:
    smtp_host: "smtp.gmail.com"
    smtp_port: 587
    from_addr: "bot@example.com"
    to_addrs: ["me@example.com"]
    use_tls: true
  slack:
    webhook_url_env: "SLACK_WEBHOOK_URL"

schedule:
  collect_cron: "0 8 * * *"
  notify_cron: "30 8 * * *"
  timezone: "Asia/Seoul"

logging:
  level: "INFO"
  file: "logs/bid_collector.log"
  max_bytes: 10485760
  backup_count: 5

database:
  path: "data/bids.sqlite"
