collection:
  sources:
    g2b_api: true
    alio: true
    g2b_crawler: false   # deprecated (엔드포인트 사망)
    d2b_api: true        # 국방전자조달 (G2B 서비스키 공용)
    kwater_api: true     # 한국수자원공사 K-water (G2B 서비스키 공용, 4 오퍼레이션)
    kepco_api: true      # 한국전력공사 KEPCO (bigdata.kepco.co.kr 전용 키 필요)
    prvt_api: true       # 누리장터 민간입찰공고 (G2B 서비스키 공용, 4 오퍼레이션)
  request_sleep_seconds: 0.5   # 페이지 간 대기 (너무 낮으면 rate limit 걸림)
  page_size: 100
  lookback_days: 1
  alio:
    keyword: ""
    max_pages: 10
  kwater:
    # 한국수자원공사 K-water 전자조달 입찰공고 (data.go.kr 15101635)
    # operations 4개 자동 순회: cntrwkList/gdsList/servcList/dmscptList
    # 주의: 경로는 "ebid" (소문자). 대문자는 500 에러.
    base_url: "https://apis.data.go.kr/B500001/ebid/tndr3"
    type_param: "_type"
  kepco:
    # 한국전력공사 KEPCO 전자입찰 (bigdata.kepco.co.kr)
    # KEPCO_API_KEY 환경변수 필요 (data.go.kr 키와 별개)
    base_url: "https://bigdata.kepco.co.kr/openapi/v1/electContract.do"
    # company_ids: ["COM01", "COM02"]  # 비워두면 전체 계열사 한 번에 조회

filters:
  include_keywords:
    ["정보통신", "통신", "전기", "소방", "건축", "기계", "냉방", "공조",
     "조경", "실내건축", "전원", "공사", "납품", "태양광", "환경"]
  exclude_keywords: ["청소"]
  min_amount_eok: 0
  max_amount_eok: 9999
  # 빈 리스트([])로 두면 모든 업종 통과. 특정 업종만 원하면 원하는 값만 나열.
  bid_types: ["물품", "용역", "공사", "외자", "기타"]
  case_sensitive: false

notifier:
  channels: ["email"]
  email:
    smtp_host: "smtp.gmail.com"
    smtp_port: 587
    from_addr: "bot@example.com"
    to_addrs: ["me@example.com"]
    use_tls: true
  slack:
    webhook_url_env: "SLACK_WEBHOOK_URL"

schedule:
  collect_cron: "0 8 * * *"
  notify_cron: "30 8 * * *"
  timezone: "Asia/Seoul"

logging:
  level: "INFO"
  file: "logs/bid_collector.log"
  max_bytes: 10485760
  backup_count: 5

database:
  path: "data/bids.sqlite"
